<!DOCTYPE html>
<html>
<head>

<title>JobSafe Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.chat-wrapper{
max-width:850px;
margin:auto;
}

.chat-container{
display:flex;
flex-direction:column;
height:420px;
border-radius:18px;
overflow:hidden;
}

.chat-messages{
flex:1;
overflow-y:auto;
}

.chat-input{
display:flex;
align-items:center;
gap:10px;
margin-top:10px;
}

.chat-input input{
flex:1;
height:46px;
padding:10px 14px;
border-radius:18px;
border:none;
background:rgba(0,0,0,0.65);
color:white;
}

.chat-input button{
height:46px;
padding:0 26px;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>JobSafe</h2>

<a href="/">Analyzer</a>
<a href="/assistant" class="active">Assistant</a>
<a href="/dashboard">Dashboard</a>
<a href="/company-checker">Company Checker</a>
<a href="/scam-library">Scam Library</a>

</div>

<div class="main">

<div class="chat-wrapper">

<h1>Fraud Detection Assistant</h1>

<div class="chat-container">

<div class="chat-messages" id="chat"></div>

<div class="chat-input">

<input id="message" placeholder="Ask about job scams...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

</div>


<script>

function sendMessage(){

let msg=document.getElementById("message").value;

if(!msg) return;

let chat=document.getElementById("chat");

chat.innerHTML+=`<div class="bubble user">${msg}</div>`;

fetch("/ask",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({question:msg})
})
.then(res=>res.json())
.then(data=>{

chat.innerHTML+=`<div class="bubble bot">${data.answer}</div>`;

chat.scrollTop=chat.scrollHeight;

});

document.getElementById("message").value="";
}

document.getElementById("message").addEventListener("keypress",function(e){
if(e.key==="Enter") sendMessage();
});

</script>

</body>
</html>
