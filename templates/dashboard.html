<!DOCTYPE html>
<html>
<head>

<title>JobSafe Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

/* Match width with other modules */

.dashboard-wrapper{
max-width:850px;
margin:auto;
}

/* Override card style only for dashboard */

.dashboard-wrapper .card{
border-radius:18px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>JobSafe</h2>

<a href="/">Analyzer</a>
<a href="/assistant">Assistant</a>
<a href="/dashboard" class="active">Dashboard</a>
<a href="/company-checker">Company Checker</a>
<a href="/scam-library">Scam Library</a>

</div>

<div class="main">

<div class="dashboard-wrapper">

<h1>Analysis Dashboard</h1>

<div class="card">

<p>Total Analyses: {{total}}</p>
<p>High Risk: {{high}}</p>
<p>Moderate Risk: {{medium}}</p>
<p>Low Risk: {{low}}</p>

</div>

</div>

</div>

</body>
</html>
